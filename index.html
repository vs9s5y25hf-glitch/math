<h1>Quesito 5</h1>

<p>Le curve sono:</p>

$$
y=e^x
$$

$$
y=6-ke^{-x}
$$

<p>Poiché devono essere tangenti:</p>

$$
e^{x_0}=ke^{-x_0}
$$

$$
k=e^{2x_0}
$$

$$
e^{x_0}=6-ke^{-x_0}
$$

$$
e^{x_0}=6-e^{x_0}
$$

$$
2e^{x_0}=6
$$

$$
e^{x_0}=3
$$

$$
x_0=\ln 3
$$

$$
k=e^{2\ln 3}=9
$$

<p>Punto di tangenza:</p>

$$
(\ln 3,3)
$$
